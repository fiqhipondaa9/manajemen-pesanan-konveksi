<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manajemen NN Apparel</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="/style.css">
</head>
<body>

<div id="loginScreen" class="login-overlay">
    <div class="login-box">
        <h2>🔑 Login NN Apparel</h2>
        <div class="form-group" style="margin-bottom: 15px;">
            <label>Username</label>
            <input type="text" id="loginUser" placeholder="Masukkan username">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="loginPass" placeholder="Masukkan password">
        </div>
        <button id="btnLogin" style="width: 100%; margin-top: 25px; background-color: #007bff; padding: 12px;">MASUK</button>
    </div>
</div>

<div id="appContainer" class="hidden">
    <div class="container">
        <div class="header-app">
            <img id="logoApparel" src="PASTE_KODE_BASE64_ANDA_DI_SINI" alt="Logo" style="height: 50px; width: 50px; background-color: #ccc; border-radius: 5px; object-fit: cover;">
            <div style="flex-grow: 1;">
                <h2>Manajemen NN Apparel</h2>
                <span style="font-size: 12px; color: green; font-weight: bold;">🟢 Online (Firebase)</span>
            </div>
            <div style="text-align: right;">
                <span style="font-size: 12px; font-weight: bold;" id="userInfo"></span><br>
                <button id="btnLogout" style="background-color: #dc3545; padding: 5px 10px; font-size: 11px; margin-top: 5px;">Keluar</button>
            </div>
        </div>

        <div class="action-bar">
            <button class="btn-pdf" id="btnPdf">📄 Download PDF Laporan</button>
            <div class="filter-box">
                <label for="filterBulan">Filter Data:</label>
                <input type="month" id="filterBulan">
                <button id="btnResetFilter" style="background-color: #6c757d; padding: 8px;">Reset</button>
            </div>
        </div>

        <div class="form-grid">
            <div class="form-group"><label>Tanggal Order</label><input type="date" id="inputTanggal"></div>
            <div class="form-group"><label>Nama Pelanggan</label><input type="text" id="inputNama" placeholder="Nama lengkap"></div>
            <div class="form-group"><label>Jenis Order</label>
                <select id="inputJenisOrder"><option value="">- Pilih -</option><option value="TRAINING">TRAINING</option><option value="ONE SET POLOS BOLA">ONE SET POLOS BOLA</option><option value="ONE SET FULL PRINT BOLA">ONE SET FULL PRINT BOLA</option><option value="ONE SET POLOS BASKET">ONE SET POLOS BASKET</option><option value="ONE SET FULL PRINT BASKET">ONE SET FULL PRINT BASKET</option><option value="ATASAN LENGAN PENDEK">ATASAN LENGAN PENDEK</option><option value="ATASAN LENGAN PANJANG">ATASAN LENGAN PANJANG</option><option value="JAKET">JAKET</option><option value="HOODY MANCING">HOODY MANCING</option></select>
            </div>
            <div class="form-group"><label>Bahan</label>
                <select id="inputBahan"><option value="">- Pilih -</option><option value="MILANO">MILANO</option><option value="PUMA">PUMA</option><option value="SCUBA">SCUBA</option><option value="EMBOSH GARIS">EMBOSH GARIS</option><option value="EMBOSH GELOMBANG">EMBOSH GELOMBANG</option><option value="COTTON">COTTON</option></select>
            </div>
            <div class="form-group"><label>Kerah</label>
                <select id="inputKerah"><option value="">- Pilih -</option><option value="WANGKY">WANGKY</option><option value="V-WANGKY">V-WANGKY</option><option value="V-NECK">V-NECK</option><option value="CUT V-NECK">CUT V-NECK</option><option value="V-SILANG">V-SILANG</option><option value="O-NECK">O-NECK</option><option value="SHANGHAI">SHANGHAI</option></select>
            </div>
            <div class="form-group"><label>Jenis Cutting</label>
                <select id="inputCutting"><option value="">- Pilih -</option><option value="OVAL">OVAL</option><option value="LURUS">LURUS</option><option value="BELAH SAMPING">BELAH SAMPING</option><option value="TUNIK">TUNIK</option></select>
            </div>
            <div class="form-group"><label>Jumlah (PCS)</label><input type="number" id="inputPcs" placeholder="0"></div>
            <div class="form-group"><label>Harga Satuan (Rp)</label><input type="number" id="inputHarga" placeholder="0"></div>
            <div class="form-group"><label>Total Harga (Rp)</label><input type="text" id="inputTotal" class="readonly-input" readonly placeholder="0"></div>
            <div class="form-group"><label>Foto Barang (Opsional)</label><input type="file" id="inputFoto" accept="image/*" style="border: 1px solid #28a745;"></div>
            <div class="form-group"><label>Estimasi Selesai (Deadline)</label><input type="date" id="inputEstimasi" style="border: 1px solid #17a2b8;"></div>
            <div class="form-group"><label>Tanggal DP</label><input type="date" id="inputTanggalDp"></div>
            <div class="form-group"><label>DP / Uang Muka (Rp)</label><input type="number" id="inputDp" placeholder="0"></div>
            <div class="form-group"><label>Jenis Bayar DP</label>
                <select id="inputJenisPembayaranDp"><option value="-">-</option><option value="CASH">CASH</option><option value="TRANSFER">TRANSFER</option><option value="QRIS">QRIS</option></select>
            </div>
            <div class="form-group"><label>Tanggal Pelunasan</label><input type="date" id="inputTanggalPelunasan"></div>
            <div class="form-group"><label>Pelunasan (Rp)</label><input type="number" id="inputPelunasan" placeholder="0"></div>
            <div class="form-group"><label>Jenis Bayar Pelunasan</label>
                <select id="inputJenisPembayaranPelunasan"><option value="-">-</option><option value="CASH">CASH</option><option value="TRANSFER">TRANSFER</option><option value="QRIS">QRIS</option></select>
            </div>
            <div class="form-group"><label>Sisa Tagihan (Rp)</label><input type="text" id="inputSisa" class="readonly-input" readonly placeholder="0"></div>
            <div class="form-group"><label>Status Pengerjaan</label>
                <select id="inputPengerjaan">
                    <option value="Design">Design</option><option value="Print/Cetak">Print/Cetak</option>
                    <option value="Press">Press</option><option value="Jahit">Jahit</option>
                    <option value="Packing">Packing</option><option value="Selesai">Selesai</option>
                </select>
            </div>
            <div class="form-group"><label>Penjahit</label>
                <select id="inputPenjahit"><option value="">- Pilih -</option><option value="AYAT">AYAT</option><option value="ATIN">ATIN</option></select>
            </div>
        </div>
        
        <button class="btn-add" id="btnAddOrder">+ Simpan Pesanan ke Server</button>

        <div class="table-wrapper">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>NO</th><th>ID NOTA</th><th>FOTO</th><th>NAMA</th><th>ORDER</th><th>DETAIL</th>
                        <th>PCS</th><th>HARGA</th><th>TOTAL</th>
                        <th>DP</th><th>PELUNASAN</th><th>SISA</th>
                        <th>ESTIMASI</th><th>STATUS</th><th>PENJAHIT</th><th>AKSI</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
                <tfoot id="tableFooter"></tfoot>
            </table>
        </div>
    </div>
</div>

<script type="module" src="/main.js"></script>
</body>
</html>
