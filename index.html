<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Manajemen Konveksi</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link rel="stylesheet" href="/src/style.css">
</head>
<body>

<div class="container">
    <h2>Manajemen Pesanan Konveksi <span style="font-size: 12px; color: green;">🟢 Online (Firebase)</span></h2>

    <div class="action-bar">
        <button class="btn-pdf" id="btnPdf">📄 Download Laporan PDF</button>
        </div>

    <div class="form-grid">
        <div class="form-group"><label>Tanggal Order</label><input type="date" id="inputTanggal"></div>
        <div class="form-group"><label>Nama Pelanggan</label><input type="text" id="inputNama" placeholder="Nama lengkap"></div>
        
        <div class="form-group">
            <label>Jenis Order</label>
            <select id="inputJenisOrder">
                <option value="">- Pilih -</option>
                <option value="TRAINING">TRAINING</option>
                <option value="ONE SET POLOS BOLA">ONE SET POLOS BOLA</option>
                <option value="ONE SET FULL PRINT BOLA">ONE SET FULL PRINT BOLA</option>
                <option value="ONE SET POLOS BASKET">ONE SET POLOS BASKET</option>
                <option value="ONE SET FULL PRINT BASKET">ONE SET FULL PRINT BASKET</option>
                <option value="ATASAN LENGAN PENDEK">ATASAN LENGAN PENDEK</option>
                <option value="ATASAN LENGAN PANJANG">ATASAN LENGAN PANJANG</option>
                <option value="JAKET">JAKET</option>
                <option value="HOODY MANCING">HOODY MANCING</option>
            </select>
        </div>
        <div class="form-group">
            <label>Bahan</label>
            <select id="inputBahan">
                <option value="">- Pilih -</option>
                <option value="MILANO">MILANO</option><option value="PUMA">PUMA</option>
                <option value="SCUBA">SCUBA</option><option value="EMBOSH GARIS">EMBOSH GARIS</option>
                <option value="EMBOSH GELOMBANG">EMBOSH GELOMBANG</option><option value="COTTON">COTTON</option>
            </select>
        </div>
        <div class="form-group">
            <label>Kerah</label>
            <select id="inputKerah">
                <option value="">- Pilih -</option>
                <option value="WANGKY">WANGKY</option><option value="V-WANGKY">V-WANGKY</option>
                <option value="V-NECK">V-NECK</option><option value="CUT V-NECK">CUT V-NECK</option>
                <option value="V-SILANG">V-SILANG</option><option value="O-NECK">O-NECK</option>
                <option value="SHANGHAI">SHANGHAI</option>
            </select>
        </div>
        <div class="form-group">
            <label>Cutting</label>
            <select id="inputCutting">
                <option value="">- Pilih -</option>
                <option value="OVAL">OVAL</option><option value="LURUS">LURUS</option>
                <option value="BELAH SAMPING">BELAH SAMPING</option><option value="TUNIK">TUNIK</option>
            </select>
        </div>

        <div class="form-group"><label>Jumlah (PCS)</label><input type="number" id="inputPcs" placeholder="0"></div>
        <div class="form-group"><label>Harga Satuan (Rp)</label><input type="number" id="inputHarga" placeholder="0"></div>
        <div class="form-group"><label>Total Harga (Rp)</label><input type="text" id="inputTotal" class="readonly-input" readonly placeholder="0"></div>

        <div class="form-group"><label>Tanggal DP</label><input type="date" id="inputTanggalDp"></div>
        <div class="form-group"><label>DP / Uang Muka (Rp)</label><input type="number" id="inputDp" placeholder="0"></div>
        <div class="form-group">
            <label>Jenis Bayar DP</label>
            <select id="inputJenisPembayaranDp">
                <option value="-">-</option><option value="CASH">CASH</option>
                <option value="TRANSFER">TRANSFER</option><option value="QRIS">QRIS</option>
            </select>
        </div>

        <div class="form-group"><label>Tanggal Pelunasan</label><input type="date" id="inputTanggalPelunasan"></div>
        <div class="form-group"><label>Pelunasan (Rp)</label><input type="number" id="inputPelunasan" placeholder="0"></div>
        <div class="form-group">
            <label>Jenis Bayar Pelunasan</label>
            <select id="inputJenisPembayaranPelunasan">
                <option value="-">-</option><option value="CASH">CASH</option>
                <option value="TRANSFER">TRANSFER</option><option value="QRIS">QRIS</option>
            </select>
        </div>

        <div class="form-group"><label>Sisa Tagihan (Rp)</label><input type="text" id="inputSisa" class="readonly-input" readonly placeholder="0"></div>
        
        <div class="form-group">
            <label>Status Pengerjaan</label>
            <select id="inputPengerjaan">
                <option value="Design">Design</option><option value="Print/Cetak">Print/Cetak</option>
                <option value="Press">Press</option><option value="Jahit">Jahit</option>
                <option value="Packing">Packing</option><option value="Selesai">Selesai</option>
            </select>
        </div>
        <div class="form-group">
            <label>Penjahit</label>
            <select id="inputPenjahit">
                <option value="">- Pilih -</option>
                <option value="AYAT">AYAT</option><option value="ATIN">ATIN</option>
            </select>
        </div>
    </div>
    
    <button class="btn-add" id="btnAddOrder">Simpan Pesanan</button>

    <div class="table-wrapper">
        <table id="dataTable">
            <thead>
                <tr>
                    <th>NO</th><th>NAMA</th><th>ORDER</th><th>BAHAN/KERAH/CUTTING</th>
                    <th>PCS</th><th>HARGA</th><th>TOTAL</th>
                    <th>TGL DP</th><th>DP</th><th>BAYAR DP</th>
                    <th>TGL LUNAS</th><th>LUNAS</th><th>BAYAR LUNAS</th>
                    <th>SISA</th><th>STATUS</th><th>PENJAHIT</th><th>AKSI</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<script type="module" src="/src/main.js"></script>
</body>
</html>
